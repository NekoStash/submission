name: Widget Submission

on:
  issues:
    types:
      - opened
      - reopened
      - labeled

permissions:
  contents: read
  issues: write

jobs:
  handle-submission:
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create GitHub App token for widgets-repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.WIDGETS_REPO_APP_ID }}
          private-key: ${{ secrets.WIDGETS_REPO_APP_PRIVATE_KEY }}
          owner: NekoStash
          repositories: widgets-repo

      - name: Process widget submission
        uses: actions/github-script@v7
        env:
          TARGET_REPO_OWNER: NekoStash
          TARGET_REPO_NAME: widgets-repo
          TARGET_REPO_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { pathToFileURL } = require('node:url');

            const scriptUrl = pathToFileURL(`${process.env.GITHUB_WORKSPACE}/.github/scripts/handle-widget-submission.mjs`).href;
            const { run } = await import(scriptUrl);

            await run({ github, context, core });
